<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dashboard - Πανελλαδικές</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #f8fafc;
            --primary: #4a90e2;
            --text-main: #1e293b;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            color: #64748b;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .class-board {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .class-board.active-updates {
            animation: pulseFlash 1s;
        }
        @keyframes pulseFlash {
            0% { box-shadow: 0 0 20px #4ade80; border-color: #4ade80; }
            100% { box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-color: #e2e8f0; }
        }
        .class-board h2 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }
        .leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 1.1rem;
        }
        .leaderboard-list li:nth-child(1) { font-weight: bold; color: #b45309; } /* Gold-ish */
        .leaderboard-list li:nth-child(2) { color: #475569; }
        .leaderboard-list li:nth-child(3) { color: #9a3412; }

        /* QR Code Modal */
        #qr-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #qr-modal.active { display: flex; }
        #qrcode { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 4px solid var(--primary); }
        .close-qr { background: #ef4444; color: white; border: none; padding: 10px 20px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; }
        .qr-trigger { background: var(--primary); color: white; border: none; padding: 10px 20px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; font-weight: bold; margin-bottom: 20px;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <h1>Teacher Dashboard (Γ' Λυκείου)</h1>
    <p class="subtitle">Live ενημέρωση επιδόσεων για τα 3 μαθήματα θεωρητικής</p>

    <button class="qr-trigger" onclick="showQR()">📱 Προβολή QR Code (Για σάρωση από μαθητές)</button>

    <div id="qr-modal">
        <h2 style="color:white; margin-bottom: 10px;">Σκανάρετε για να παίξετε!</h2>
        <div id="qrcode"></div>
        <button class="close-qr" onclick="closeQR()">Κλείσιμο</button>
    </div>

    <!-- HOST PANEL FOR KAHOOT MODE -->
    <div style="background: white; border: 2px solid var(--primary); padding: 20px; border-radius: 12px; margin-bottom: 2rem; max-width: 800px; margin-left: auto; margin-right: auto;">
        <h2 style="color: var(--primary); margin-top: 0;">🎮 Host Live Game (Καθηγητής)</h2>
        
        <div id="host-setup">
            <select id="host-class-select" style="padding: 10px; font-size: 1.1rem; border-radius: 5px; margin-right: 10px;">
                <option value="history">Ιστορία Κατεύθυνσης</option>
                <option value="ancient">Αρχαία Ελληνικά</option>
                <option value="latin">Λατινικά Προσανατολισμού</option>
            </select>
            <button class="qr-trigger" onclick="initHostGame()" style="background:#10b981; margin-bottom: 0;">Έναρξη Δωματίου</button>
        </div>

        <div id="host-controls" style="display: none; margin-top: 20px; text-align: center;">
            <div id="host-status" style="font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; color: #1e293b;">Αναμονή παικτών...</div>
            <button onclick="hostNextQuestion()" class="qr-trigger" style="background:#0284c7; margin: 5px;">Επόμενη Ερώτηση</button>
            <button onclick="hostRevealAnswer()" class="qr-trigger" style="background:#d97706; margin: 5px;">Αποκάλυψη Σωστού</button>
            <button onclick="hostEndGame()" class="qr-trigger" style="background:#dc2626; margin: 5px;">Λήξη Παιχνιδιού</button>
            
            <div style="margin-top: 20px; text-align: left;">
                <h3 style="margin-bottom: 10px;">Πίνακας Live Σκορ:</h3>
                <ul id="live-players-list" class="leaderboard-list" style="background: #f8fafc; padding: 15px; border-radius: 8px;"></ul>
            </div>
        </div>
    </div>

    <div class="dashboard-grid" id="dashboard-grid"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="data.js"></script>
    
    <script>
        const subjectMap = {
            "history": "Ιστορία",
            "ancient": "Αρχαία Ελληνικά",
            "latin": "Λατινικά"
        };

        const grid = document.getElementById('dashboard-grid');
        const boards = {};

        for(let key in subjectMap) {
            const card = document.createElement('div');
            card.className = 'class-board';
            card.innerHTML = `
                <h2>${subjectMap[key]}</h2>
                <ul class="leaderboard-list" id="list-${key}">
                    <li>Αναμονή δεδομένων...</li>
                </ul>
            `;
            grid.appendChild(card);
            boards[key] = card;
        }

        if (typeof db !== "undefined") {
            const leaderboardsRef = db.ref('leaderboards_panhellenic');
            
            leaderboardsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                for(let key in subjectMap) {
                    const ul = document.getElementById(`list-${key}`);
                    if(data[key]) {
                        const entries = Object.values(data[key]);
                        entries.sort((a, b) => b.points - a.points);
                        
                        if(ul.innerHTML !== '') {
                            boards[key].classList.remove('active-updates');
                            void boards[key].offsetWidth; 
                            boards[key].classList.add('active-updates');
                        }

                        ul.innerHTML = '';
                        entries.slice(0, 10).forEach((entry, i) => {
                            const li = document.createElement('li');
                            const isMillionaire = entry.mode === 'millionaire';
                            const scoreDisplay = isMillionaire ? `${entry.score.toLocaleString()}€` : `${entry.score}%`;
                            li.innerHTML = `<span>#${i+1} ${entry.name}</span> <span>${scoreDisplay} <small>(${entry.mode || 'classic'})</small></span>`;
                            ul.appendChild(li);
                        });
                    } else {
                        ul.innerHTML = '<li>Κανένα σκορ ακόμα.</li>';
                    }
                }
            });

            // Live Game Host Listener
            db.ref('liveGamePanhellenic/players').on('value', (snap) => {
                const players = snap.val();
                if(players) {
                    const ul = document.getElementById('live-players-list');
                    ul.innerHTML = '';
                    Object.entries(players).sort((a,b) => b[1].score - a[1].score).forEach((p, i) => {
                        ul.innerHTML += `<li><span>#${i+1} ${p[0]}</span> <span>${p[1].score} pts</span></li>`;
                    });
                }
            });

        } else {
            alert("Το Dashboard χρειάζεται τα Firebase Credentials στο firebase-config.js για να λειτουργήσει.");
        }

        // QR Code Logic
        function showQR() {
            let url = prompt("Επικολλήστε εδώ το Link της εφαρμογής (π.χ. από το Netlify):");
            if(url) {
                document.getElementById("qrcode").innerHTML = ""; // clear old
                new QRCode(document.getElementById("qrcode"), {
                    text: url,
                    width: 300,
                    height: 300
                });
                document.getElementById('qr-modal').classList.add('active');
            }
        }
        function closeQR() {
            document.getElementById('qr-modal').classList.remove('active');
        }

        // Host Multiplayer Logic
        let hostQuestions = [];
        let hostCurrentIndex = -1;

        async function initHostGame() {
            const classKey = document.getElementById('host-class-select').value;
            if(typeof quizData === 'undefined') {
                alert("Σφάλμα: Τα δεδομένα ερωτήσεων δεν φορτώθηκαν.");
                return;
            }
            hostQuestions = [...quizData[classKey].questions].sort(() => 0.5 - Math.random());
            hostCurrentIndex = -1;

            if(typeof db !== 'undefined') {
                await db.ref('liveGamePanhellenic').set({
                    state: 'waiting',
                    questionIndex: -1,
                    players: {}
                });
                document.getElementById('host-setup').style.display = 'none';
                document.getElementById('host-controls').style.display = 'block';
            }
        }

        function hostNextQuestion() {
            hostCurrentIndex++;
            if(hostCurrentIndex >= hostQuestions.length) {
                hostEndGame();
                return;
            }
            db.ref('liveGamePanhellenic').update({
                state: 'playing',
                questionIndex: hostCurrentIndex,
                currentQuestionData: hostQuestions[hostCurrentIndex]
            });
            document.getElementById('host-status').textContent = `Ερώτηση ${hostCurrentIndex + 1} / ${hostQuestions.length}`;
        }

        function hostRevealAnswer() {
            db.ref('liveGamePanhellenic').update({
                state: 'reveal'
            });
            document.getElementById('host-status').textContent = "Αποκαλύφθηκε το σωστό!";
        }

        function hostEndGame() {
            db.ref('liveGamePanhellenic').update({
                state: 'ended'
            });
            document.getElementById('host-setup').style.display = 'block';
            document.getElementById('host-controls').style.display = 'none';
            alert("Το παιχνίδι ολοκληρώθηκε!");
        }
    </script>
</body>
</html>
